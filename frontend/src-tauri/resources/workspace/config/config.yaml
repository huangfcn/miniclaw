server:
  port: 9000
  threads: 4
  tools: "~/.miniclaw/tools"

conversation:
  provider: "local"
  model: "qwen3.5:35b"
  endpoint: "http://localhost:11434/v1/chat/completions"
  # api_key: "sk-..." # Can be set here or via environment

memory:
  workspace: "~/.miniclaw"
  l1_distillation_trigger: "message_count"   # "message_count" or "token_count"
  l1_to_l2_threshold: 100                    # messages before L1 -> L2 distillation
  l1_token_threshold: 5000                   # New tokens since last distill to trigger L1->L2
  compaction_threshold: 0.8 # trigger proactive flush at 80% context
  time: "13:00" # trigger L2 -> L3 distillation after 1:00 PM

  # LLM for memory summarization
  provider: "local" # provider for memory LLM
  model: "qwen3.5:9b" # model used for memory summarization
  endpoint: "http://localhost:11434/v1/chat/completions"

embedding:
  provider: "local" # Using local OpenAI-compatible service
  model: "qwen3-embedding:8b"
  endpoint: "http://localhost:11434/v1/embeddings"
  dimension: 1024 # Truncating 4096-dim Qwen3 to 1024 via MRL

logging:
  level: "debug"
  file: "backend.log"
  enabled: true

skills:
  path: "skills"

bridges:
  server_bridge:
    url: "ws://localhost:9000/api/chat/stream"
